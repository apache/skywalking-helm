# Default values for skywalking.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

oap:
  storageType: elasticsearch
  # Set oap.image.tag at install time, e.g. --set oap.image.tag=<release>

# Set ui.image.tag at install time, e.g. --set ui.image.tag=horizon-<release>
# Horizon UI's BFF refuses to start with no users. For UI auth/RBAC, layer
# `-f chart/skywalking/values-horizon-ui.yaml` on top of this file, or
# define your own `ui.config.auth.local.users[]` here.

elasticsearch:
  enabled: false
  config:               # For users of an existing elasticsearch cluster, takes effect when `elasticsearch.enabled` is false
    host: elasticsearch-es-http
    port:
      http: 9200
    user: "xxx"         # [optional]
    password: "xxx"     # [optional]

{{- if and .Values.ui.enabled .Values.ui.persistence.enabled (not .Values.ui.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ template "skywalking.ui.fullname" . }}-data
  labels:
    app: {{ template "skywalking.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    component: "{{ .Values.ui.name }}"
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
  {{- with .Values.ui.persistence.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  accessModes:
{{ toYaml .Values.ui.persistence.accessModes | indent 4 }}
  resources:
    requests:
      storage: {{ .Values.ui.persistence.size | quote }}
  {{- if .Values.ui.persistence.storageClass }}
  {{- if (eq "-" .Values.ui.persistence.storageClass) }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ .Values.ui.persistence.storageClass | quote }}
  {{- end }}
  {{- end }}
{{- end }}

# https://docs.sentry.io/server/installation/docker/#running-migrations

apiVersion: batch/v1
kind: Job
metadata:
  # NOTE: This Job is intentionally a normal release resource, NOT a Helm hook.
  # Running it as a post-install/post-upgrade hook deadlocks `helm upgrade --install --wait`:
  # Helm waits for every release resource to become Ready before it runs post-* hooks, but the
  # OAP Deployment runs in `-Dmode=no-init` and never becomes Ready until this Job has created
  # the storage schema -- so the hook (and therefore the schema) would never run. As a main-phase
  # resource the Job runs alongside the OAP Deployment, which blocks in no-init mode until the
  # schema appears, so `--wait` resolves instead of deadlocking.
  #
  # The name carries a hash of the chart values: a Job's `spec.template` is immutable, so a stable
  # name would make `helm upgrade` fail with "field is immutable" whenever the pod template changes.
  # Hashing yields a fresh Job whenever a relevant value changes; Helm prunes the previous one.
  name: "{{ printf "%s-init-%s" (include "skywalking.oap.fullname" . | trunc 40 | trimSuffix "-") (.Values | toYaml | sha256sum | trunc 8) }}"
  labels:
    app: {{ template "skywalking.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    component: "{{ template "skywalking.fullname" . }}-job"
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
spec:
  {{- if .Values.oapInit.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ .Values.oapInit.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      name: "{{ .Release.Name }}-oap-init"
      labels:
        app: {{ template "skywalking.name" . }}
        component: "{{ template "skywalking.fullname" . }}-job"
        release: {{ .Release.Name }}
{{- if .Values.oapInit.extraPodLabels }}
{{ toYaml .Values.oapInit.extraPodLabels | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ template "skywalking.serviceAccountName.oap" . }}
      {{- with .Values.oap.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.oapInit.nodeAffinity }}
      affinity:
      {{- end }}
      {{- with .Values.oapInit.nodeAffinity }}
        nodeAffinity:
{{ toYaml . | indent 10 }}
      {{- end }}
{{- if .Values.oapInit.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.oapInit.nodeSelector | indent 8 }}
{{- end }}
{{- if .Values.oapInit.tolerations }}
      tolerations:
{{ toYaml .Values.oapInit.tolerations | indent 8 }}
{{- end }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
      restartPolicy: Never
      initContainers:
        {{- include "skywalking.containers.wait-for-storage" . | nindent 6 }}
      containers:
      - name: {{ .Values.oap.name }}
        image: {{ .Values.oap.image.repository }}:{{ required "oap.image.tag is required" .Values.oap.image.tag }}
        imagePullPolicy: {{ .Values.oap.image.pullPolicy }}
{{- if .Values.oap.resources }}
        resources:
{{ toYaml .Values.oap.resources | indent 10 }}
{{- end }}
        env:
        - name: JAVA_OPTS
          value: "{{ .Values.oap.javaOpts }} -Dmode=init"
        {{- include "skywalking.oap.envs.storage" . | nindent 8 }}
        {{- range $key, $value :=  .Values.oap.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}

        volumeMounts:
        {{- include "skywalking.oap.volumeMounts" . | nindent 8 }}

      volumes:
      {{- include "skywalking.oap.volumes" . | nindent 6 }}

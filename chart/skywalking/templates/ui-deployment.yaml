{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "skywalking.ui.fullname" . }}
  labels:
    app: {{ template "skywalking.name" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    component: "{{ .Values.ui.name }}"
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ui.replicas }}
  # Horizon UI's BFF holds the session table in memory. Recreate (not
  # RollingUpdate) avoids the brief window of two pods serving traffic with
  # disjoint session state.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ template "skywalking.name" . }}
      component: "{{ .Values.ui.name }}"
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ template "skywalking.name" . }}
        component: "{{ .Values.ui.name }}"
        release: {{ .Release.Name }}
      annotations:
        # Roll the pod when horizon.yaml changes — ConfigMap subPath mounts
        # don't auto-update at runtime.
        checksum/config: {{ include (print $.Template.BasePath "/ui-configmap.yaml") . | sha256sum }}
        {{- with .Values.ui.podAnnotations }}
{{ toYaml . | indent 8 }}
        {{- end }}
    spec:
      {{- with .Values.ui.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      affinity:
      {{- with .Values.ui.nodeAffinity }}
        nodeAffinity:
{{ toYaml . | indent 10 }}
      {{- end }}
{{- if .Values.ui.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.ui.nodeSelector | indent 8 }}
{{- end }}
{{- if .Values.ui.tolerations }}
      tolerations:
{{ toYaml .Values.ui.tolerations | indent 8 }}
{{- end }}
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
{{- end }}
      containers:
      - name: {{ .Values.ui.name }}
        image: {{ .Values.ui.image.repository }}:{{ required "ui.image.tag is required" .Values.ui.image.tag }}
        imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.ui.service.internalPort }}
          name: page
{{- if .Values.ui.resources }}
        resources:
{{ toYaml .Values.ui.resources | indent 10 }}
{{- end }}
{{- if .Values.ui.livenessProbe }}
        livenessProbe:
{{ toYaml .Values.ui.livenessProbe | indent 10 }}
{{- end }}
{{- if .Values.ui.readinessProbe }}
        readinessProbe:
{{ toYaml .Values.ui.readinessProbe | indent 10 }}
{{- end }}
{{- if or .Values.ui.envFromSecret .Values.ui.extraEnv }}
        env:
{{- range .Values.ui.extraEnv }}
        - {{ toYaml . | nindent 10 | trim }}
{{- end }}
{{- end }}
{{- if .Values.ui.envFromSecret }}
        envFrom:
        - secretRef:
            name: {{ .Values.ui.envFromSecret }}
{{- end }}
        volumeMounts:
        - name: horizon-config
          mountPath: /app/horizon.yaml
          subPath: horizon.yaml
          readOnly: true
        - name: horizon-data
          mountPath: /data
      volumes:
      - name: horizon-config
        configMap:
          name: {{ template "skywalking.ui.fullname" . }}
          items:
          - key: horizon.yaml
            path: horizon.yaml
      - name: horizon-data
{{- if .Values.ui.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ default (printf "%s-data" (include "skywalking.ui.fullname" .)) .Values.ui.persistence.existingClaim }}
{{- else }}
        emptyDir: {}
{{- end }}
{{- end }}

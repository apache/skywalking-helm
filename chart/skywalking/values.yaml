# Default values for skywalking.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

serviceAccounts:
  oap:
    # By default, create SkyWalking's ServiceAccount. If set to false, you also need to change `serviceAccounts.oap.name` value to a custom ServiceAccount name.
    create: true
    name: ""

imagePullSecrets: []

initContainer:
  image: busybox
  tag: '1.30'

oap:
  name: oap
  image:
    repository: skywalking.docker.scarf.sh/apache/skywalking-oap-server
    tag: null # Must be set explicitly
    pullPolicy: IfNotPresent
  storageType: null
  ports:
    # add more ports here if you need, for example
    # zabbix: 10051
    grpc: 11800
    rest: 12800
    # admin REST exposed by OAP 10.5+. Horizon UI's BFF talks to this for
    # runtime-rule, DSL debugging, inspect, status, and config dump. Set to
    # null (or remove) if the deployed OAP version predates 10.5 — Horizon
    # admin features will be unavailable in that case.
    admin: 17128
    # zipkin-receiver: 9411
    # zipkin-query: 9412
    # promql: 9090
    # logql: 3100
    # traceql: 3200
    # metrics: 1234
  replicas: 2
  service:
    type: ClusterIP
    # add annotations to the oap service
    annotations: {}
  javaOpts: -Xmx2g -Xms2g
  antiAffinity: "soft"
  nodeAffinity: {}
  nodeSelector: {}
  tolerations: []
  resources: {}
  # limits:
  #   cpu: 8
  #   memory: 8Gi
  # requests:
  #   cpu: 8
  #   memory: 4Gi
  livenessProbe: {}
  # tcpSocket:
  #   port: 12800
  # initialDelaySeconds: 5
  # periodSeconds: 20
  startupProbe: {}
  # Time to boot the application is set to:
  # 9 (failureThreshold) * 10 (periodSeconds) = 90 seconds in this case.
  # tcpSocket:
  #   port: 12800
  # failureThreshold: 9
  # periodSeconds: 10
  readinessProbe: {}
  # tcpSocket:
  #   port: 12800
  # initialDelaySeconds: 5
  # periodSeconds: 20
  # podAnnotations:
  #   example: oap-foo
  securityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000
  env: # more env, please refer to https://hub.docker.com/r/apache/skywalking-oap-server

  # or https://github.com/apache/skywalking-docker/blob/master/6/6.4/oap/README.md#sw_telemetry

  # Allows you to add any config files in /skywalking/config
  # such as log4j2.xml, oal/core.oal, etc.
  config: {}
  # metadata-service-mapping.yaml: |
  #   serviceName: e2e::${LABELS."service.istio.io/canonical-name"}
  #   serviceInstanceName: ${NAME}
  # oal:
  #   core.oal: |
  #     service_resp_time = from(Service.latency).longAvg();
  #     service_sla = from(Service.*).percent(status == true);
  #     service_cpm = from(Service.*).cpm();
  # log4j2.xml: |
  #   <Configuration status="DEBUG">
  #     <!-- ... -->
  #   </Configuration>
  # ui-initialized-templates:
  #   general:
  #     general-service.json: |
  #       [{"id":"General-Service" ... }]
  # When 'dynamicConfig.enabled' set to true, enable oap dynamic configuration through k8s configmap，
  # Note: The default configmap data is empty, please refer to the detailed documentation (https://github.com/apache/skywalking/blob/master/docs/en/setup/backend/dynamic-config.md)
  # Sync period in seconds. Defaults to 60 seconds.
  dynamicConfig:
    enabled: false
    period: 60
    config: {}
    #  agent-analyzer.default.slowDBAccessThreshold: default:200,mongodb:50
    #  alarm.default.alarm-settings: |
    #   rules:
    #     # Rule unique name, must be ended with `_rule`.
    #     service_resp_time_rule:
    #       metrics-name: service_resp_time
    #       op: ">"
    #       threshold: 1000
    #       period: 10
    #       count: 3
    #       silence-period: 5
    #       Response time of service {name} is more than 1000ms in 3 minutes of last 10 minutes.

    # A list of secrets and their paths to mount inside the pod
  secretMounts: []
#    - name: elastic-certificates
#      secretName: elastic-certificates
#      path: /usr/share/elasticsearch/config/certs

ui:
  # Set to false to skip the UI deployment entirely — no Deployment, Service,
  # Ingress, ConfigMap, or PVC will be created. Useful when an external UI
  # talks to OAP directly, or when only the OAP backend is wanted.
  enabled: true
  name: ui
  # Horizon UI's BFF holds the active session table in memory; a multi-replica
  # deployment without sticky routing breaks logins on every other request.
  # Keep replicas: 1 unless your ingress provides sticky sessions.
  replicas: 1
  image:
    # Horizon UI release images ship to Docker Hub `apache/skywalking-ui`
    # tagged `horizon-<x.y.z>` (e.g. `horizon-0.6.0`). Dev / pre-release
    # images live at `ghcr.io/apache/skywalking-horizon-ui` and are tagged
    # by SHA / `vX.Y.Z` / `main`.
    repository: skywalking.docker.scarf.sh/apache/skywalking-ui
    tag: null # Must be set explicitly, e.g. horizon-0.6.0
    pullPolicy: IfNotPresent
  # podAnnotations:
  #   example: oap-foo
  nodeAffinity: {}
  nodeSelector: {}
  tolerations: []
  ingress:
    enabled: false
    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    path: /
    hosts: []
    # - skywalking.local
    tls: []
    #  - secretName: skywalking-tls
    #    hosts:
    #      - skywalking.local
  service:
    type: ClusterIP
    # clusterIP: None
    externalPort: 80
    # Horizon UI's BFF binds 8081 by default.
    internalPort: 8081
    ## nodePort is the port on each node on which this service is exposed when type=NodePort
    ## Default: auto-allocated port if not specified. 30080 is just an example
    ##
    # nodePort: 30080
    ## External IP addresses of service
    ## Default: nil
    ##
    # externalIPs:
    # - 192.168.0.1
    #
    ## LoadBalancer IP if service.type is LoadBalancer
    ## Default: nil
    ##
    # loadBalancerIP: 10.2.2.2
    # Annotation example: setup ssl with aws cert when service.type is LoadBalancer
    # service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:EXAMPLE_CERT
    annotations: {}
    ## Limit load balancer source ips to list of CIDRs (where available)
    # loadBalancerSourceRanges: []
  # The image runs as a non-root alpine system user `horizon`. PVCs mounted
  # at /data and (optionally) /app/bundled_templates must be group-writable
  # by that user; fsGroup defaults to 101 (alpine's typical `nobody` GID).
  securityContext:
    fsGroup: 101
  # Persistent state directory used by the BFF for audit log, setup state,
  # alarm state, and wire debug log. Without persistence these files land in
  # the container's writable layer and are lost on pod restart.
  persistence:
    enabled: false
    # existingClaim: ""
    # storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    annotations: {}
  resources: {}
  livenessProbe:
    tcpSocket:
      port: 8081
    initialDelaySeconds: 30
    periodSeconds: 20
  readinessProbe:
    # /api/auth/health is the only unauthenticated BFF health endpoint —
    # /api/oap/info is gated behind a logged-in session and returns 401
    # to an unauthenticated kubelet probe.
    httpGet:
      path: /api/auth/health
      port: 8081
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 6
  # `config` is rendered verbatim into the `horizon.yaml` ConfigMap mounted
  # at /app/horizon.yaml. Schema and field reference:
  # https://github.com/apache/skywalking-horizon-ui/blob/main/docs/setup/horizon-yaml.md
  # See also /app/horizon.example.yaml inside the image for the upstream
  # commented example.
  #
  # Chart-managed defaults wire `oap.queryUrl` / `oap.adminUrl` to the
  # in-cluster OAP service. Anything you set here merges over the defaults
  # via Helm's mergeOverwrite semantics.
  #
  # `auth.local.users` is intentionally empty by default — Horizon's BFF
  # refuses to start without it, which is the upstream's "no default
  # admin/admin" stance. See the README "Web UI" section for two paths:
  # a copy-pastable demo snippet (publicly-known admin/admin hash) or the
  # production Secret + `${VAR}` interpolation pattern.
  config:
    server:
      host: 0.0.0.0
      port: 8081
    oap:
      # queryUrl / adminUrl default to the in-cluster OAP service when unset.
      # Override here if you point the UI at an external OAP cluster.
      # queryUrl: http://skywalking-oap:12800
      # adminUrl: http://skywalking-oap:17128
      timeoutMs: 15000
      # auth:
      #   username: skywalking
      #   password: "${HORIZON_OAP_PW}"
    auth:
      backend: local
      local:
        users: []
        # - username: admin
        #   passwordHash: "${HORIZON_ADMIN_HASH}"
        #   roles: [admin]
    rbac:
      enabled: true
    session:
      ttlMinutes: 60
      cookieName: horizon_sid
      # Flip to true when serving over HTTPS (browser refuses Secure
      # cookies over plain HTTP).
      cookieSecure: false
  # Optional: pass extra env vars into the BFF container. Use this to
  # provide values referenced by `${VAR}` interpolation in `config`
  # (e.g. admin password hash, OAP basic-auth password) without baking
  # them into the ConfigMap.
  # extraEnv:
  #   - name: HORIZON_ADMIN_HASH
  #     valueFrom:
  #       secretKeyRef:
  #         name: horizon-admin
  #         key: passwordHash
  extraEnv: []
  # Optional: reference a pre-created Secret whose keys are exposed as env
  # vars in the BFF container (shortcut for the common ConfigMap+Secret
  # pattern). The Secret must define keys referenced in `config` via
  # ${VAR} interpolation.
  # envFromSecret: horizon-secrets
  envFromSecret: ""


oapInit:
  nodeAffinity: {}
  nodeSelector: {}
  tolerations: []
  extraPodLabels: {}
  # sidecar.istio.io/inject: false

# Elasticsearch managed by ECK (eck-elasticsearch chart)
# When enabled, the ECK operator is also installed as a dependency.
# ref: https://github.com/elastic/cloud-on-k8s
elasticsearch:
  enabled: true
  version: 8.18.8
  fullnameOverride: ""

  # For users of an existing elasticsearch cluster, takes effect when `elasticsearch.enabled` is false
  config:
    host: elasticsearch # es service on kubernetes or host
    port:
      http: 9200
    user: "" # [optional]
    password: "" # [optional]

  # Labels that will be applied to the Elasticsearch resource
  labels: {}

  # Annotations that will be applied to the Elasticsearch resource
  annotations: {}

  # Settings to control how Elasticsearch will be accessed
  # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-accessing-elastic-services.html
  http:
    # Disable TLS on HTTP layer so OAP can connect without certificate trust configuration.
    # To re-enable TLS, remove the tls section or set disabled to false,
    # and configure OAP to trust the self-signed certificate.
    tls:
      selfSignedCertificate:
        disabled: true
    # service:
    #   spec:
    #     type: LoadBalancer

  # Control Elasticsearch Secure Settings
  # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-es-secure-settings.html
  secureSettings: []
  #  - secretName: one-secure-settings-secret

  # Settings for limiting the number of simultaneous changes to an Elasticsearch resource
  # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-update-strategy.html
  updateStrategy: {}
  #  changeBudget:
  #    maxSurge: 3
  #    maxUnavailable: 1

  # VolumeClaimDeletePolicy sets the policy for handling deletion of PersistentVolumeClaims for all NodeSets.
  # Possible values are DeleteOnScaledownOnly and DeleteOnScaledownAndClusterDeletion.
  volumeClaimDeletePolicy: ""

  # Node configuration settings
  # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-node-configuration.html
  nodeSets:
  - name: default
    count: 3
    config:
      # For production workloads, it is strongly recommended to increase the kernel setting
      # vm.max_map_count to 262144 via an initContainer and leave node.store.allow_mmap unset.
      # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-virtual-memory.html
      node.store.allow_mmap: false
    # Persistent storage for Elasticsearch data
    # volumeClaimTemplates:
    # - metadata:
    #     name: elasticsearch-data
    #   spec:
    #     accessModes:
    #     - ReadWriteOnce
    #     resources:
    #       requests:
    #         storage: 30Gi
    #     # storageClassName: standard
    podTemplate:
      metadata: {}
        # annotations:
        #   iam.amazonaws.com/role: es-cluster
        # labels:
        #   my-label: my-value
      spec:
        # Pod scheduling constraints
        # ref: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-advanced-node-scheduling.html

        # affinity:
        #   nodeAffinity:
        #     requiredDuringSchedulingIgnoredDuringExecution:
        #       nodeSelectorTerms:
        #       - matchExpressions:
        #         - key: topology.kubernetes.io/zone
        #           operator: In
        #           values:
        #           - us-east-1a

        # nodeSelector: {}

        # tolerations: []

        # imagePullSecrets: []

        # priorityClassName: ""

        # terminationGracePeriodSeconds: 120

        # Init containers (e.g. to set vm.max_map_count or install plugins)
        # initContainers:
        # - command:
        #   - sh
        #   - "-c"
        #   - sysctl -w vm.max_map_count=262144
        #   name: sysctl
        #   securityContext:
        #     privileged: true
        #     runAsUser: 0

        containers:
        - name: elasticsearch
          resources:
            requests:
              cpu: 100m
              memory: 2Gi
            limits:
              memory: 2Gi
          # Environment variables (replaces the old extraEnvs and esJavaOpts)
          # env:
          # - name: ES_JAVA_OPTS
          #   value: "-Xms1g -Xmx1g"

          # Container-level security context (typically set by ECK automatically)
          # securityContext:
          #   capabilities:
          #     drop:
          #     - ALL
          #   runAsNonRoot: true
          #   runAsUser: 1000

  # Ingress configuration for exposing Elasticsearch externally
  ingress:
    enabled: false
    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    hosts:
    - host: chart-example.local
      path: /
    tls:
      enabled: false
      # secretName: chart-example-tls

postgresql:
  enabled: false # Whether to start a demo postgresql deployment, don't use this for production.
  config:
    # The hostname of your own postgresql service, this only takes effect when postgresql.enabled is false.
    host: postgresql-service.your-awesome-company.com
  auth:
    postgresPassword: "123456"
    username: postgres
    password: "123456"
    database: skywalking
  containerPorts:
    postgresql: 5432
  primary:
    persistence:
      enabled: false
  readReplicas:
    persistence:
      enabled: false

banyandb:
  enabled: false
  config:
    grpcAddress: "banyandb-grpc:17912"
    httpAddress: "banyandb-http:17913"
  auth:
    enabled: false
    users:
    - username: "admin"
      password: "banyandb"
  standalone:
    enabled: true
  cluster:
    enabled: false
    liaison:
      replicas: 1
    data:
      replicas: 1
    fodc:
      agent:
        resources:
          requests:
            - key: memory
              value: 256Mi
          limits:
            - key: memory
              value: 256Mi

satellite:
  name: satellite
  replicas: 1
  enabled: false
  image:
    repository: skywalking.docker.scarf.sh/apache/skywalking-satellite
    tag: null # Must be set explicitly
    pullPolicy: IfNotPresent
  ports:
    grpc: 11800
    prometheus: 1234
    # Disable the pprof port by default, only enabled it when you need to debug the satellite.
    # pprof: 6060
  service:
    type: ClusterIP
  antiAffinity: "soft"
  nodeAffinity: {}
  nodeSelector: {}
  tolerations: []
  resources: {}
  # limits:
  #   cpu: 4
  #   memory: 8Gi
  # requests:
  #   cpu: 4
  #   memory: 4Gi
  podAnnotations: # example: oap-foo

  env: # more env, please refer to https://skywalking.apache.org/docs/skywalking-satellite/latest/en/setup/readme/#satellite_configyaml

  # Allows you to add any config files in /skywalking/config.
  config: {}
  # satellite_config.yaml: |
  #   key: val
  securityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000

nameOverride: ""
fullnameOverride: ""

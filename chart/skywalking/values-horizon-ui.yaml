# UI-only example values overlay. Apply alongside the OAP-required values
# (`oap.image.tag`, `oap.storageType`, `ui.image.tag`):
#
#   helm install <release> chart/skywalking \
#     --set oap.image.tag=10.4.0 \
#     --set oap.storageType=elasticsearch \
#     --set ui.image.tag=horizon-1.0.0 \
#     -f chart/skywalking/values-horizon-ui.yaml
#
# This file exists so an operator who wants to customize Horizon UI's auth /
# RBAC / session has a self-contained template to copy from — it intentionally
# does NOT pin OAP version or storage backend, since those are orthogonal to
# the UI configuration.
#
# The Horizon `config` block mirrors the public horizon.example.yaml that
# ships at /app/horizon.example.yaml inside the image — same shape, same
# field names. See:
#   https://github.com/apache/skywalking-horizon-ui/blob/main/horizon.example.yaml
#   https://github.com/apache/skywalking-horizon-ui/blob/main/docs/setup/horizon-yaml.md
#
# ⚠ ROTATE THE DEFAULT PASSWORDS BEFORE EXPOSING THE UI BEYOND A TRUSTED
# NETWORK. The hashes below are public; anyone can log in as admin/admin.
# Generate replacements by checking out apache/skywalking-horizon-ui and
# running `pnpm --filter bff cli:hash`, or wire production secrets through
# a Kubernetes Secret + `ui.envFromSecret` + `${VAR}` interpolation.

ui:
  config:
    server:
      host: 0.0.0.0
      port: 8081
    oap:
      # queryUrl / adminUrl default to the in-cluster OAP service; the chart
      # fills them in. Set them explicitly only when pointing at an external
      # OAP cluster.
      timeoutMs: 15000
      # Optional basic-auth — uncomment when the OAP cluster requires it.
      # auth:
      #   username: skywalking
      #   password: "${HORIZON_OAP_PW}"
    auth:
      backend: local
      local:
        users:
          - username: admin            # password: admin
            passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$eemqy1r72oSXR58y8VpRqw$Bn/dULrmJTHEi3263KfgWDEwQmUsqNLi3xwyv/DekHM"
            roles: [admin]
          - username: skywalking       # password: skywalking
            passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$Zqj8HhQDqm8d5c2MipHYZw$BsaCnu4bdd4uadIldx3wwYLsdo47Thxb7Lv1MXpWG2Q"
            roles: [viewer, maintainer]
    rbac:
      enabled: true
    session:
      ttlMinutes: 60
      cookieName: horizon_sid
      cookieSecure: false   # flip to true when serving over HTTPS

# Reach the UI from your laptop:
#   kubectl port-forward svc/<release>-skywalking-helm-ui 8080:80
# then open http://127.0.0.1:8080 and log in as admin/admin (or
# skywalking/skywalking).
